name: Eval

on:
  push:
  pull_request:

jobs:
  kb-integrity:
    name: Knowledge-base integrity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: eval/requirements.txt
      - run: pip install -r eval/requirements.txt
      - run: pytest eval/test_kb_integrity.py -v
        working-directory: .

  ocr-eval:
    name: OCR accuracy against synthetic fault images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: mcp-servers/symptom-analysis/requirements.txt
      - run: pip install -r mcp-servers/symptom-analysis/requirements.txt
      - run: python eval/eval_ocr.py
